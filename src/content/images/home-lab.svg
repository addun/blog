<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#1a1a2e"/>
  
  <!-- Server rack -->
  <g>
    <!-- Rack frame -->
    <rect x="40" y="40" width="120" height="120" fill="#2d3748" stroke="#4a5568" stroke-width="3" rx="4"/>
    
    <!-- Server 1 -->
    <rect x="50" y="50" width="100" height="25" fill="#4a5568" stroke="#718096" stroke-width="2" rx="2"/>
    <circle cx="65" cy="62.5" r="3" fill="#48bb78"/>
    <circle cx="75" cy="62.5" r="3" fill="#48bb78"/>
    <rect x="85" y="57" width="50" height="3" fill="#2d3748" rx="1"/>
    <rect x="85" y="63" width="50" height="3" fill="#2d3748" rx="1"/>
    <rect x="85" y="69" width="50" height="3" fill="#2d3748" rx="1"/>
    
    <!-- Server 2 -->
    <rect x="50" y="80" width="100" height="25" fill="#4a5568" stroke="#718096" stroke-width="2" rx="2"/>
    <circle cx="65" cy="92.5" r="3" fill="#48bb78"/>
    <circle cx="75" cy="92.5" r="3" fill="#ed8936"/>
    <rect x="85" y="87" width="50" height="3" fill="#2d3748" rx="1"/>
    <rect x="85" y="93" width="50" height="3" fill="#2d3748" rx="1"/>
    <rect x="85" y="99" width="50" height="3" fill="#2d3748" rx="1"/>
    
    <!-- Server 3 -->
    <rect x="50" y="110" width="100" height="25" fill="#4a5568" stroke="#718096" stroke-width="2" rx="2"/>
    <circle cx="65" cy="122.5" r="3" fill="#48bb78"/>
    <circle cx="75" cy="122.5" r="3" fill="#48bb78"/>
    <rect x="85" y="117" width="50" height="3" fill="#2d3748" rx="1"/>
    <rect x="85" y="123" width="50" height="3" fill="#2d3748" rx="1"/>
    <rect x="85" y="129" width="50" height="3" fill="#2d3748" rx="1"/>
    
    <!-- Network device -->
    <rect x="50" y="140" width="100" height="15" fill="#2c5282" stroke="#3182ce" stroke-width="2" rx="2"/>
    <circle cx="60" cy="147.5" r="2" fill="#63b3ed"/>
    <circle cx="68" cy="147.5" r="2" fill="#63b3ed"/>
    <circle cx="76" cy="147.5" r="2" fill="#4299e1"/>
    <circle cx="84" cy="147.5" r="2" fill="#63b3ed"/>
  </g>
  
  <!-- Home icon -->
  <g transform="translate(155, 25)">
    <path d="M 0 10 L 15 0 L 30 10 L 30 30 L 20 30 L 20 18 L 10 18 L 10 30 L 0 30 Z" fill="#ed8936" stroke="#c05621" stroke-width="2"/>
    <rect x="12" y="22" width="6" height="8" fill="#c05621"/>
