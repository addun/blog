<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a202c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3748;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="playGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f56565;stop-opacity:0.35" />
      <stop offset="100%" style="stop-color:#f56565;stop-opacity:0" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Grid pattern overlay -->
  <g opacity="0.03">
    <path d="M 0 0 L 1200 0 L 1200 630 L 0 630 Z" fill="none" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="63" x2="1200" y2="63" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="126" x2="1200" y2="126" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="189" x2="1200" y2="189" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="252" x2="1200" y2="252" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="378" x2="1200" y2="378" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="441" x2="1200" y2="441" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="504" x2="1200" y2="504" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="567" x2="1200" y2="567" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Play button / media motif -->
  <g transform="translate(800, 165)">
    <rect x="-20" y="-20" width="340" height="340" fill="url(#playGlow)" rx="24"/>
    <!-- Outer ring -->
    <circle cx="150" cy="150" r="140" fill="#2d3748" stroke="#f56565" stroke-width="8"/>
    <!-- Play triangle -->
    <path d="M 115 90 L 220 150 L 115 210 Z" fill="#f56565" stroke="#f56565" stroke-width="6" stroke-linejoin="round"/>
    <!-- Small VPN shield badge -->
    <g transform="translate(225, 215)">
      <path d="M 0 -10 L 36 4 L 36 34 Q 36 62 0 74 Q -36 62 -36 34 L -36 4 Z"
            fill="#2d3748" stroke="#48bb78" stroke-width="5" stroke-linejoin="round"/>
      <path d="M -16 30 L -4 44 L 18 14" fill="none" stroke="#48bb78" stroke-width="6"
            stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Home icon -->
  <g transform="translate(950, 70)">
    <path d="M 0 30 L 40 0 L 80 30 L 80 85 L 55 85 L 55 50 L 25 50 L 25 85 L 0 85 Z"
          fill="#ed8936" stroke="#dd6b20" stroke-width="3" stroke-linejoin="round"/>
    <rect x="32" y="60" width="16" height="25" fill="#dd6b20"/>
    <circle cx="60" cy="67" r="3" fill="#fbd38d"/>
  </g>

  <!-- Title -->
  <text x="80" y="210" font-family="Arial, sans-serif" font-size="68" font-weight="bold" fill="#ffffff">
    Your Own
  </text>
  <text x="80" y="288" font-family="Arial, sans-serif" font-size="68" font-weight="bold" fill="#f56565">
    Media Server
  </text>
  <text x="80" y="366" font-family="Arial, sans-serif" font-size="68" font-weight="bold" fill="#ffffff">
    The *arr Stack
  </text>

  <!-- Subtitle -->
  <text x="80" y="440" font-family="Arial, sans-serif" font-size="32" fill="#a0aec0">
    Home lab series &#183; Part 5
  </text>

  <!-- Decorative elements -->
  <circle cx="1100" cy="550" r="40" fill="#f56565" opacity="0.1"/>
  <circle cx="150" cy="80" r="30" fill="#ed8936" opacity="0.1"/>
  <circle cx="1050" cy="450" r="25" fill="#48bb78" opacity="0.1"/>
</svg>
