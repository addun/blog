<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a202c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3748;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="photoGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9f7aea;stop-opacity:0.35" />
      <stop offset="100%" style="stop-color:#9f7aea;stop-opacity:0" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Grid pattern overlay -->
  <g opacity="0.03">
    <path d="M 0 0 L 1200 0 L 1200 630 L 0 630 Z" fill="none" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="63" x2="1200" y2="63" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="126" x2="1200" y2="126" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="189" x2="1200" y2="189" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="252" x2="1200" y2="252" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="378" x2="1200" y2="378" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="441" x2="1200" y2="441" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="504" x2="1200" y2="504" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="567" x2="1200" y2="567" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Stacked photos / gallery motif -->
  <g transform="translate(770, 165)">
    <rect x="-20" y="-20" width="380" height="320" fill="url(#photoGlow)" rx="24"/>

    <!-- Back photo -->
    <g transform="rotate(-8 150 150)">
      <rect x="40" y="30" width="240" height="180" rx="10" fill="#3c4657" stroke="#5a6b7f" stroke-width="3"/>
    </g>
    <!-- Middle photo -->
    <g transform="rotate(5 150 150)">
      <rect x="40" y="40" width="240" height="180" rx="10" fill="#2d3748" stroke="#9f7aea" stroke-width="3"/>
    </g>
    <!-- Front photo -->
    <rect x="50" y="60" width="240" height="180" rx="10" fill="#2d3748" stroke="#63b3ed" stroke-width="4"/>
    <!-- Sun + mountains inside the front photo -->
    <circle cx="110" cy="110" r="22" fill="#f6ad55"/>
    <path d="M 60 230 L 130 150 L 180 200 L 230 140 L 280 230 Z" fill="#48bb78" opacity="0.9"/>
  </g>

  <!-- Home icon -->
  <g transform="translate(950, 80)">
    <path d="M 0 30 L 40 0 L 80 30 L 80 85 L 55 85 L 55 50 L 25 50 L 25 85 L 0 85 Z"
          fill="#ed8936" stroke="#dd6b20" stroke-width="3" stroke-linejoin="round"/>
    <rect x="32" y="60" width="16" height="25" fill="#dd6b20"/>
    <circle cx="60" cy="67" r="3" fill="#fbd38d"/>
  </g>

  <!-- Title -->
  <text x="80" y="210" font-family="Arial, sans-serif" font-size="70" font-weight="bold" fill="#ffffff">
    Self-Hosting
  </text>
  <text x="80" y="288" font-family="Arial, sans-serif" font-size="70" font-weight="bold" fill="#9f7aea">
    Your Photos
  </text>
  <text x="80" y="366" font-family="Arial, sans-serif" font-size="70" font-weight="bold" fill="#ffffff">
    with Immich
  </text>

  <!-- Subtitle -->
  <text x="80" y="440" font-family="Arial, sans-serif" font-size="32" fill="#a0aec0">
    Home lab series &#183; Part 4
  </text>

  <!-- Decorative elements -->
  <circle cx="1100" cy="550" r="40" fill="#9f7aea" opacity="0.1"/>
  <circle cx="150" cy="80" r="30" fill="#ed8936" opacity="0.1"/>
  <circle cx="1050" cy="450" r="25" fill="#48bb78" opacity="0.1"/>
</svg>
