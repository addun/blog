<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a202c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3748;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="whaleGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4299e1;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#4299e1;stop-opacity:0" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Grid pattern overlay -->
  <g opacity="0.03">
    <path d="M 0 0 L 1200 0 L 1200 630 L 0 630 Z" fill="none" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="63" x2="1200" y2="63" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="126" x2="1200" y2="126" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="189" x2="1200" y2="189" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="252" x2="1200" y2="252" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="378" x2="1200" y2="378" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="441" x2="1200" y2="441" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="504" x2="1200" y2="504" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="567" x2="1200" y2="567" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Whale + containers illustration -->
  <g transform="translate(720, 180)">
    <!-- Glow -->
    <rect x="-20" y="-40" width="420" height="320" fill="url(#whaleGlow)" rx="24"/>

    <!-- Stacked containers on the whale's back -->
    <rect x="60" y="-20" width="70" height="60" fill="#3c4657" stroke="#63b3ed" stroke-width="3" rx="6"/>
    <rect x="140" y="-20" width="70" height="60" fill="#3c4657" stroke="#63b3ed" stroke-width="3" rx="6"/>
    <rect x="220" y="-20" width="70" height="60" fill="#3c4657" stroke="#63b3ed" stroke-width="3" rx="6"/>
    <rect x="100" y="-90" width="70" height="60" fill="#2c5282" stroke="#4299e1" stroke-width="3" rx="6"/>
    <rect x="180" y="-90" width="70" height="60" fill="#2c5282" stroke="#4299e1" stroke-width="3" rx="6"/>

    <!-- Whale body -->
    <path d="M 20 60 Q 20 160 120 160 L 300 160 Q 360 160 360 100 L 360 70 Q 360 60 350 60 Z"
          fill="#4299e1" stroke="#2c5282" stroke-width="4" stroke-linejoin="round"/>
    <!-- Tail -->
    <path d="M 360 70 L 410 45 L 400 100 Z" fill="#4299e1" stroke="#2c5282" stroke-width="4" stroke-linejoin="round"/>
    <!-- Eye -->
    <circle cx="70" cy="100" r="7" fill="#1a202c"/>
    <!-- Spout -->
    <path d="M 50 60 Q 40 20 60 5" fill="none" stroke="#63b3ed" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Home icon -->
  <g transform="translate(950, 80)">
    <path d="M 0 30 L 40 0 L 80 30 L 80 85 L 55 85 L 55 50 L 25 50 L 25 85 L 0 85 Z"
          fill="#ed8936" stroke="#dd6b20" stroke-width="3" stroke-linejoin="round"/>
    <rect x="32" y="60" width="16" height="25" fill="#dd6b20"/>
    <circle cx="60" cy="67" r="3" fill="#fbd38d"/>
  </g>

  <!-- Title -->
  <text x="80" y="220" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff">
    Setting Up Your
  </text>
  <text x="80" y="300" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#63b3ed">
    Home Lab
  </text>
  <text x="80" y="380" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff">
    Ubuntu &amp; Docker
  </text>

  <!-- Subtitle -->
  <text x="80" y="450" font-family="Arial, sans-serif" font-size="32" fill="#a0aec0">
    The software foundation Part 2
  </text>

  <!-- Decorative elements -->
  <circle cx="1100" cy="550" r="40" fill="#4299e1" opacity="0.1"/>
  <circle cx="150" cy="80" r="30" fill="#ed8936" opacity="0.1"/>
  <circle cx="1050" cy="450" r="25" fill="#48bb78" opacity="0.1"/>
</svg>
