<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a202c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3748;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#48bb78;stop-opacity:0.35" />
      <stop offset="100%" style="stop-color:#48bb78;stop-opacity:0" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Grid pattern overlay -->
  <g opacity="0.03">
    <path d="M 0 0 L 1200 0 L 1200 630 L 0 630 Z" fill="none" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="63" x2="1200" y2="63" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="126" x2="1200" y2="126" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="189" x2="1200" y2="189" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="252" x2="1200" y2="252" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="378" x2="1200" y2="378" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="441" x2="1200" y2="441" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="504" x2="1200" y2="504" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="567" x2="1200" y2="567" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Shield (DNS / ad blocking) with routing nodes -->
  <g transform="translate(740, 150)">
    <!-- Glow -->
    <rect x="0" y="-20" width="360" height="360" fill="url(#shieldGlow)" rx="24"/>

    <!-- Shield -->
    <path d="M 180 10 L 300 55 L 300 175 Q 300 280 180 330 Q 60 280 60 175 L 60 55 Z"
          fill="#2d3748" stroke="#48bb78" stroke-width="6" stroke-linejoin="round"/>
    <!-- Check mark -->
    <path d="M 130 175 L 168 215 L 240 120" fill="none" stroke="#48bb78" stroke-width="14"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Routing nodes coming off the shield -->
    <line x1="300" y1="110" x2="360" y2="80" stroke="#63b3ed" stroke-width="4"/>
    <line x1="300" y1="160" x2="360" y2="160" stroke="#63b3ed" stroke-width="4"/>
    <line x1="300" y1="210" x2="360" y2="240" stroke="#63b3ed" stroke-width="4"/>
    <circle cx="368" cy="78" r="12" fill="#4299e1"/>
    <circle cx="370" cy="160" r="12" fill="#4299e1"/>
    <circle cx="368" cy="242" r="12" fill="#4299e1"/>
  </g>

  <!-- Home icon -->
  <g transform="translate(950, 80)">
    <path d="M 0 30 L 40 0 L 80 30 L 80 85 L 55 85 L 55 50 L 25 50 L 25 85 L 0 85 Z"
          fill="#ed8936" stroke="#dd6b20" stroke-width="3" stroke-linejoin="round"/>
    <rect x="32" y="60" width="16" height="25" fill="#dd6b20"/>
    <circle cx="60" cy="67" r="3" fill="#fbd38d"/>
  </g>

  <!-- Title -->
  <text x="80" y="210" font-family="Arial, sans-serif" font-size="68" font-weight="bold" fill="#ffffff">
    DNS, Ad-Blocking &amp;
  </text>
  <text x="80" y="288" font-family="Arial, sans-serif" font-size="68" font-weight="bold" fill="#48bb78">
    Local Domains
  </text>
  <text x="80" y="366" font-family="Arial, sans-serif" font-size="68" font-weight="bold" fill="#ffffff">
    AdGuard + Caddy
  </text>

  <!-- Subtitle -->
  <text x="80" y="440" font-family="Arial, sans-serif" font-size="32" fill="#a0aec0">
    Home lab series &#183; Part 3
  </text>

  <!-- Decorative elements -->
  <circle cx="1100" cy="550" r="40" fill="#4299e1" opacity="0.1"/>
  <circle cx="150" cy="80" r="30" fill="#ed8936" opacity="0.1"/>
  <circle cx="1050" cy="450" r="25" fill="#48bb78" opacity="0.1"/>
</svg>
