<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" font-family="Verdana, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a202c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3748;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f6ad55" />
    </marker>
  </defs>

  <rect width="1200" height="320" fill="url(#bg2)"/>

  <rect x="40" y="90" width="220" height="140" rx="10" fill="#2d3748" stroke="#4a5568" stroke-width="2"/>
  <text x="150" y="130" fill="#f7fafc" font-size="17" text-anchor="middle" font-weight="bold">Home network</text>
  <text x="150" y="155" fill="#a0aec0" font-size="13" text-anchor="middle">router / phones / laptops</text>
  <text x="150" y="177" fill="#a0aec0" font-size="13" text-anchor="middle">Poland</text>
  <text x="150" y="205" fill="#f6ad55" font-size="13" text-anchor="middle" font-weight="bold">WireGuard client</text>

  <rect x="480" y="70" width="260" height="180" rx="10" fill="#7b341e" stroke="#f6ad55" stroke-width="2"/>
  <text x="610" y="112" fill="#f7fafc" font-size="17" text-anchor="middle" font-weight="bold">VPS in the US</text>
  <text x="610" y="140" fill="#fbd38d" font-size="13" text-anchor="middle">WireGuard server</text>
  <text x="610" y="162" fill="#fbd38d" font-size="13" text-anchor="middle">NATs client traffic</text>
  <text x="610" y="184" fill="#fbd38d" font-size="13" text-anchor="middle">out through its own IP</text>

  <rect x="960" y="90" width="200" height="140" rx="10" fill="#2d3748" stroke="#4a5568" stroke-width="2"/>
  <text x="1060" y="130" fill="#f7fafc" font-size="17" text-anchor="middle" font-weight="bold">Any website</text>
  <text x="1060" y="155" fill="#a0aec0" font-size="13" text-anchor="middle">sees a US IP,</text>
  <text x="1060" y="177" fill="#a0aec0" font-size="13" text-anchor="middle">not Poland</text>

  <line x1="260" y1="160" x2="475" y2="160" stroke="#f6ad55" stroke-width="2.5" marker-end="url(#arrow2)"/>
  <text x="367" y="145" fill="#fbd38d" font-size="12" text-anchor="middle">encrypted WG tunnel</text>

  <line x1="740" y1="160" x2="955" y2="160" stroke="#f6ad55" stroke-width="2.5" marker-end="url(#arrow2)"/>
  <text x="847" y="145" fill="#fbd38d" font-size="12" text-anchor="middle">plain internet traffic</text>
</svg>
