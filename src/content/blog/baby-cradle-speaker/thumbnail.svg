<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a202c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3748;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Grid pattern overlay -->
  <g opacity="0.03">
    <line x1="0" y1="105" x2="1200" y2="105" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="210" x2="1200" y2="210" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="525" x2="1200" y2="525" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- ============ Title ============ -->
  <text x="80" y="150" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#ffffff">
    Home Assistant,
  </text>
  <text x="80" y="222" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#ffffff">
    Raspberry Pi &amp;
  </text>
  <text x="80" y="294" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#18BCF2">
    a BT Speaker
  </text>

  <!-- ============ Flow diagram ============ -->
  <g font-family="Arial, sans-serif" font-size="27" fill="#e2e8f0">
    <rect x="80" y="400" width="230" height="64" rx="10" fill="#2d3748" stroke="#18BCF2" stroke-width="2"/>
    <text x="195" y="440" text-anchor="middle">Home Assistant</text>

    <text x="330" y="440" fill="#a0aec0" font-size="30">→</text>

    <rect x="370" y="400" width="150" height="64" rx="10" fill="#2d3748" stroke="#a0aec0" stroke-width="2"/>
    <text x="445" y="440" text-anchor="middle">Wi-Fi</text>

    <text x="540" y="440" fill="#a0aec0" font-size="30">→</text>

    <rect x="580" y="400" width="220" height="64" rx="10" fill="#2d3748" stroke="#c51a4a" stroke-width="2"/>
    <text x="690" y="440" text-anchor="middle">Raspberry Pi</text>

    <text x="820" y="440" fill="#a0aec0" font-size="30">→</text>

    <rect x="860" y="400" width="170" height="64" rx="10" fill="#2d3748" stroke="#18BCF2" stroke-width="2"/>
    <text x="945" y="440" text-anchor="middle">Bluetooth</text>
  </g>

  <!-- Speaker icon -->
  <g transform="translate(1080,480) scale(0.55)">
    <rect x="0" y="0" width="120" height="170" rx="14" fill="#2d3748" stroke="#5a6b7f" stroke-width="4"/>
    <circle cx="60" cy="42" r="16" fill="#1a202c" stroke="#718096" stroke-width="3"/>
    <circle cx="60" cy="42" r="5" fill="#4a5568"/>
    <circle cx="60" cy="115" r="34" fill="#1a202c" stroke="#718096" stroke-width="3"/>
    <circle cx="60" cy="115" r="22" fill="#252d3a" stroke="#4a5568" stroke-width="2"/>
    <circle cx="60" cy="115" r="9" fill="#4a5568"/>
    <circle cx="60" cy="160" r="3.5" fill="#48bb78"/>
  </g>

  <!-- Decorative elements -->
  <circle cx="1120" cy="90" r="30" fill="#18BCF2" opacity="0.10"/>
  <circle cx="120" cy="540" r="40" fill="#48bb78" opacity="0.08"/>
  <circle cx="700" cy="560" r="22" fill="#18BCF2" opacity="0.10"/>
</svg>
