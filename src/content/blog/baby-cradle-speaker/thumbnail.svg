<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a202c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3748;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="btGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#18BCF2;stop-opacity:0.30" />
      <stop offset="100%" style="stop-color:#18BCF2;stop-opacity:0" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Grid pattern overlay -->
  <g opacity="0.03">
    <line x1="0" y1="63" x2="1200" y2="63" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="126" x2="1200" y2="126" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="189" x2="1200" y2="189" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="252" x2="1200" y2="252" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="378" x2="1200" y2="378" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="441" x2="1200" y2="441" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="504" x2="1200" y2="504" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="567" x2="1200" y2="567" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Glow behind the device cluster -->
  <rect x="760" y="60" width="380" height="500" fill="url(#btGlow)" rx="40"/>

  <!-- ============ Home Assistant logo (top) ============ -->
  <g transform="translate(825,85) scale(0.65)">
    <path d="M320 301.762C320 310.012 313.25 316.762 305 316.762H95C86.75 316.762 80 310.012 80 301.762V211.762C80 203.512 84.77 191.993 90.61 186.153L189.39 87.3725C195.22 81.5425 204.77 81.5425 210.6 87.3725L309.39 186.162C315.22 191.992 320 203.522 320 211.772V301.772V301.762Z" fill="#F2F4F9"/>
    <path d="M309.39 186.153L210.61 87.3725C204.78 81.5425 195.23 81.5425 189.4 87.3725L90.61 186.153C84.78 191.983 80 203.512 80 211.762V301.762C80 310.012 86.75 316.762 95 316.762H187.27L146.64 276.132C144.55 276.852 142.32 277.262 140 277.262C128.7 277.262 119.5 268.062 119.5 256.762C119.5 245.462 128.7 236.262 140 236.262C151.3 236.262 160.5 245.462 160.5 256.762C160.5 259.092 160.09 261.322 159.37 263.412L191 295.042V179.162C184.2 175.822 179.5 168.842 179.5 160.772C179.5 149.472 188.7 140.272 200 140.272C211.3 140.272 220.5 149.472 220.5 160.772C220.5 168.842 215.8 175.822 209 179.162V260.432L240.46 228.972C239.84 227.012 239.5 224.932 239.5 222.772C239.5 211.472 248.7 202.272 260 202.272C271.3 202.272 280.5 211.472 280.5 222.772C280.5 234.072 271.3 243.272 260 243.272C257.5 243.272 255.12 242.802 252.91 241.982L209 285.892V316.772H305C313.25 316.772 320 310.022 320 301.772V211.772C320 203.522 315.23 192.002 309.39 186.162V186.153Z" fill="#18BCF2"/>
  </g>


  <!-- ============ Raspberry Pi logo (middle) ============ -->
  <!-- Official Raspberry Pi mark on a white app-icon card (the logo's shading needs a light backing) -->
  <g transform="translate(790,385) scale(0.19)" fill="#c51a4a">
    <rect width="512" height="512" rx="15%" fill="#ffffff"/>
    <g transform="scale(2)">
      <!-- left half -->
      <g>
        <path fill="#000000" d="M129 63c-8-20-15-19-20-19-4-5-9-3-13-2-5-3-9-2-12 0-3-3-8-1-9 2-6-2-8 1-9 2-9-1-8 8-7 9-1 1-3 6 0 9-2 4 1 7 3 8-2 4 3 8 5 8 0 5 4 8 7 8-1 4 9 7 9 7-21 9-18 32-18 32-29 21-7 46-7 46s5 35 24 39c3 5 21 11 21 11s7 11 26 11"/>
        <path fill="#6cc04a" d="M74 52l-4-4 12 2-3-4 9 3-2-4 9 4v-4l9 6v-5l8 7 v-4c22 22 4 29 4 29C99 64 79 58 79 58s26 13 35 24c0 0-4 15-30 9l3-3-9-2 3-2-9-4h6l-9-6h6l-9-6h5l-8-6l5-2l-5-7"/>
        <path d="M69 133c-19 9-9 34-3 37s15-42 3-37m35-34c7 2-30 32-31 26 0-18 9-28 31-26m-5 65c-29-3-19-44 6-44s22 44-6 44m-26 8c-9 6 3 43 26 35 9-7-8-43-26-35"/>
      </g>
      <!-- right half (mirrored) -->
      <g transform="matrix(-1 0 0 1 256 0)">
        <path fill="#000000" d="M129 63c-8-20-15-19-20-19-4-5-9-3-13-2-5-3-9-2-12 0-3-3-8-1-9 2-6-2-8 1-9 2-9-1-8 8-7 9-1 1-3 6 0 9-2 4 1 7 3 8-2 4 3 8 5 8 0 5 4 8 7 8-1 4 9 7 9 7-21 9-18 32-18 32-29 21-7 46-7 46s5 35 24 39c3 5 21 11 21 11s7 11 26 11"/>
        <path fill="#6cc04a" d="M74 52l-4-4 12 2-3-4 9 3-2-4 9 4v-4l9 6v-5l8 7 v-4c22 22 4 29 4 29C99 64 79 58 79 58s26 13 35 24c0 0-4 15-30 9l3-3-9-2 3-2-9-4h6l-9-6h6l-9-6h5l-8-6l5-2l-5-7"/>
        <path d="M69 133c-19 9-9 34-3 37s15-42 3-37m35-34c7 2-30 32-31 26 0-18 9-28 31-26m-5 65c-29-3-19-44 6-44s22 44-6 44m-26 8c-9 6 3 43 26 35 9-7-8-43-26-35"/>
      </g>
      <!-- center drupelets -->
      <path d="M106 216c17 24 45 5 44-2s-39-9-44 2m45-35c0-28-45-27-45 0s43 28 45 0m-43-75c5-15 34-15 40-1s-37 19-40 1"/>
    </g>
  </g>

  <!-- Bluetooth link: Pi -> speaker -->
  <g transform="translate(935,431) scale(0.9)">
    <!-- Bluetooth rune -->
    <g transform="translate(0,0) scale(2.6)" stroke="#18BCF2" stroke-width="2.6" fill="none" stroke-linejoin="round" stroke-linecap="round">
      <path d="M -5 -5 L 5 5 L 0 10 L 0 -10 L 5 -5 L -5 5"/>
    </g>
    <!-- waves toward speaker -->
    <g transform="translate(40,0)" stroke="#18BCF2" fill="none" stroke-linecap="round">
      <path d="M 6 -16 A 22 22 0 0 1 6 16" stroke-width="4" opacity="0.9"/>
      <path d="M 22 -26 A 36 36 0 0 1 22 26" stroke-width="4" opacity="0.55"/>
    </g>
  </g>

  <!-- ============ Speaker (bottom right) ============ -->
  <g transform="translate(1030,385) scale(0.6)">
    <rect x="0" y="0" width="120" height="170" rx="14" fill="#2d3748" stroke="#5a6b7f" stroke-width="4"/>
    <!-- tweeter -->
    <circle cx="60" cy="42" r="16" fill="#1a202c" stroke="#718096" stroke-width="3"/>
    <circle cx="60" cy="42" r="5" fill="#4a5568"/>
    <!-- woofer -->
    <circle cx="60" cy="115" r="34" fill="#1a202c" stroke="#718096" stroke-width="3"/>
    <circle cx="60" cy="115" r="22" fill="#252d3a" stroke="#4a5568" stroke-width="2"/>
    <circle cx="60" cy="115" r="9" fill="#4a5568"/>
    <!-- power LED -->
    <circle cx="60" cy="160" r="3.5" fill="#48bb78"/>
  </g>

  <!-- ============ Title ============ -->
  <text x="80" y="200" font-family="Arial, sans-serif" font-size="66" font-weight="bold" fill="#ffffff">
    A Baby Cradle
  </text>
  <text x="80" y="276" font-family="Arial, sans-serif" font-size="66" font-weight="bold" fill="#ffffff">
    as a Home Assistant
  </text>
  <text x="80" y="352" font-family="Arial, sans-serif" font-size="66" font-weight="bold" fill="#18BCF2">
    Speaker
  </text>

  <!-- Subtitle -->
  <text x="80" y="432" font-family="Arial, sans-serif" font-size="32" fill="#a0aec0">
    Bluetooth + MPD on a Raspberry Pi
  </text>

  <!-- Decorative elements -->
  <circle cx="150" cy="90" r="30" fill="#18BCF2" opacity="0.10"/>
  <circle cx="120" cy="540" r="40" fill="#48bb78" opacity="0.08"/>
  <circle cx="700" cy="560" r="22" fill="#18BCF2" opacity="0.10"/>
</svg>
